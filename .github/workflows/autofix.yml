name: autofix.ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  autofix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true

      - uses: actions/cache@v4
        with:
          path: |
            node_modules/.vite
            node_modules/.cache/knip
          key: ${{ runner.os }}-autofix-vite-${{ hashFiles('pnpm-lock.yaml', 'vite.config.ts', 'knip.json') }}
          restore-keys: |
            ${{ runner.os }}-autofix-vite-

      - run: vp run autofix

      - uses: autofix-ci/action@c5b2d67aa2274e7b5a18224e8171550871fc7e4a
        with:
          commit-message: "chore: apply automated updates"
