name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # Runtime compatibility — proves the shipped dist runs on the library's
  # engines.node floor. Skips the toolchain (lint, knip) because ESLint 10
  # + @antfu/eslint-config uses eslint-plugin-unicorn which requires the
  # V8 Iterator Helpers proposal (Node 22+).
  runtime:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22, 24]
    steps:
      - uses: actions/checkout@v6
      - run: npm i -fg corepack && corepack enable
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install
      - run: pnpm check:no-deps
      - run: pnpm build
      - run: pnpm test:package
      - run: pnpm vitest run --typecheck

  # Toolchain — lint, knip, size-limit. Requires Node 22+ (see runtime job).
  toolchain:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]
    steps:
      - uses: actions/checkout@v6
      - run: npm i -fg corepack && corepack enable
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install
      - run: pnpm check:knip
      - run: pnpm lint
      - run: pnpm build
      - if: matrix.node == 22
        run: pnpm exec size-limit
