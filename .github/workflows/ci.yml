name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  runtime:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24, 26]
    steps:
      - uses: actions/checkout@v7

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: ${{ matrix.node }}
          cache: true
          sfw: true

      - uses: actions/cache@v4
        with:
          path: node_modules/.vite
          key: ${{ runner.os }}-node${{ matrix.node }}-vite-${{ hashFiles('pnpm-lock.yaml', 'vite.config.ts') }}
          restore-keys: |
            ${{ runner.os }}-node${{ matrix.node }}-vite-

      - run: vp run test
      - run: vp run build
