name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22, 24]
    steps:
      - uses: actions/checkout@v6
      - run: npm i -fg corepack && corepack enable
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install
      - run: pnpm check:no-deps
      - run: pnpm check:knip
      - run: pnpm lint
      - run: pnpm build
      - run: pnpm test:package
      - if: matrix.node == 22
        run: pnpm exec size-limit
      - run: pnpm vitest run --typecheck
