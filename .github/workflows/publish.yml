name: publish

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]*"

permissions:
  contents: read
  id-token: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true
          sfw: true

      - uses: actions/cache@v4
        with:
          path: node_modules/.vite
          key: ${{ runner.os }}-publish-vite-${{ hashFiles('pnpm-lock.yaml', 'vite.config.ts') }}
          restore-keys: |
            ${{ runner.os }}-publish-vite-

      - run: vp run test
      - run: vp run build

  publish:
    needs: check
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/better-ufo
    steps:
      - uses: actions/checkout@v7

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true
          sfw: true
          registry-url: https://registry.npmjs.org

      - run: pnpm publish --access public --provenance --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
