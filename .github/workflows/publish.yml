name: publish

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]*"

permissions:
  contents: read
  id-token: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true
          sfw: true

      - uses: actions/cache@v6
        with:
          path: |
            node_modules/.vite
            node_modules/.cache/knip
          key: ${{ runner.os }}-publish-vite-${{ hashFiles('pnpm-lock.yaml', 'vite.config.ts', 'knip.json') }}
          restore-keys: |
            ${{ runner.os }}-publish-vite-

      - run: vp run test
      - run: vp run build

  publish:
    needs: check
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/better-ufo
    steps:
      - uses: actions/checkout@v7

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true
          sfw: true
          registry-url: https://registry.npmjs.org

      - name: Activate Corepack pnpm@11.10.0 (matches package.json packageManager pin)
        run: |
          corepack enable
          corepack prepare pnpm@11.10.0 --activate

      - run: pnpm publish --access public --provenance --no-git-checks
